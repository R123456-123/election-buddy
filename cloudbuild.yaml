# =============================================================
# cloudbuild.yaml — Google Cloud Build configuration
# =============================================================
# Builds the Docker image and deploys to Cloud Run.
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml .
#
# Prerequisites:
#   - Enable Cloud Build and Cloud Run APIs
#   - Set the GEMINI_API_KEY as a Cloud Run environment variable
#     or use Secret Manager
# =============================================================

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/election-buddy:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/election-buddy:latest'
      - '.'

  # Step 2: Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/election-buddy:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/election-buddy:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'election-buddy'
      - '--image=gcr.io/$PROJECT_ID/election-buddy:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'

images:
  - 'gcr.io/$PROJECT_ID/election-buddy:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/election-buddy:latest'

timeout: '600s'
